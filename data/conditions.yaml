    label: Microbial overgrowth & infection
  immune:
    label: Immune & chemical sensitivity
  structural:
    label: Structural, hormonal & motility
  braingut:
    label: Brain-gut & psychological
  masqueraders:
    label: Conditions often mistaken for IBS

